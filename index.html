<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FileWall - Coming Soon</title>

  <!-- Premium Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: #020617;
    }

    /* Background Image (network style) */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
      opacity: 0.15;
      filter: blur(6px);
      z-index: 0;
    }

    /* Dark overlay for readability */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(15,23,42,0.6), #020617);
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 480px;
      width: 90%;
      padding: 40px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    h1 {
      font-size: 44px;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
      font-size: 15px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input, select, textarea {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      background: rgba(2, 6, 23, 0.6);
      color: white;
      font-size: 14px;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #64748b;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #6366f1;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .success {
      margin-top: 20px;
      color: #22c55e;
      display: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>FileWall</h1>
    <p>Get paid before delivering files. No more chasing clients.</p>

    <form id="form">
      <input type="email" id="email" placeholder="Your email" required />

      <select id="role">
        <option>Freelancer</option>
        <option>Agency</option>
        <option>Creator</option>
      </select>

      <textarea id="problem" placeholder="What's your biggest issue with clients?"></textarea>

      <button type="submit">Join Waitlist</button>
    </form>

    <div class="success" id="success">
      You're on the list 🚀
    </div>
  </div>

  <script>
    const form = document.getElementById("form");
    const success = document.getElementById("success");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        email: document.getElementById("email").value,
        role: document.getElementById("role").value,
        problem: document.getElementById("problem").value,
      };

      try {
        await fetch("YOUR_GOOGLE_SCRIPT_URL", {
          method: "POST",
          body: JSON.stringify(data),
        });

        form.style.display = "none";
        success.style.display = "block";
      } catch (err) {
        alert("Something went wrong");
      }
    });
  </script>

</body>
</html>
